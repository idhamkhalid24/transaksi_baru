<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#3b6ef0" />
  <title>Rocky Hijab Staff Ringan - Sesuai Index</title>
  <style>
    /* ===== RESET & ROOT ===== */
    :root{--safe:env(safe-area-inset-bottom,0px)}

    /* ===== LIGHT THEME ===== */
    [data-theme="light"]{
      --bg:#f0f4fa;
      --bg2:#e8eef7;
      --card:#ffffff;
      --card2:#f7f9fd;
      --text:#1a2235;
      --text2:#2d3a4f;
      --muted:#7a8ba0;
      --line:#dce5f0;
      --line2:#c8d5e8;
      --blue:#3b6ef0;
      --blue-light:#ebf0fe;
      --blue-mid:#c7d4fc;
      --green:#18a85a;
      --green-light:#e6f9ef;
      --green-mid:#b8f0d0;
      --red:#e0333f;
      --red-light:#feeaea;
      --red-mid:#fcc;
      --amber:#c97c10;
      --amber-light:#fef6e4;
      --amber-mid:#fddea0;
      --soft:#f4f7fc;
      --nav:#ffffff;
      --hero1:#2a5bd7;
      --hero2:#4facf0;
      --shadow:0 2px 12px rgba(30,50,90,.07),0 1px 3px rgba(30,50,90,.04);
      --shadow-md:0 6px 24px rgba(30,50,90,.10),0 2px 6px rgba(30,50,90,.06);
      --shadow-lg:0 16px 48px rgba(30,50,90,.14),0 4px 12px rgba(30,50,90,.08);
      --radius-sm:10px;
      --radius:16px;
      --radius-lg:22px;
      --radius-xl:28px;
    }

    /* ===== DARK THEME ===== */
    [data-theme="dark"]{
      --bg:#0d1422;
      --bg2:#111929;
      --card:#161f30;
      --card2:#1a2438;
      --text:#e8edf8;
      --text2:#c8d3e8;
      --muted:#7a8faa;
      --line:#243050;
      --line2:#1e2c44;
      --blue:#5c8af5;
      --blue-light:rgba(92,138,245,.14);
      --blue-mid:rgba(92,138,245,.3);
      --green:#3dca7a;
      --green-light:rgba(61,202,122,.13);
      --green-mid:rgba(61,202,122,.3);
      --red:#f06070;
      --red-light:rgba(240,96,112,.13);
      --red-mid:rgba(240,96,112,.3);
      --amber:#f0b030;
      --amber-light:rgba(240,176,48,.13);
      --amber-mid:rgba(240,176,48,.3);
      --soft:#131c2e;
      --nav:#161f30;
      --hero1:#2048c8;
      --hero2:#3a90d8;
      --shadow:0 2px 14px rgba(0,0,0,.28),0 1px 4px rgba(0,0,0,.18);
      --shadow-md:0 6px 28px rgba(0,0,0,.36),0 2px 8px rgba(0,0,0,.22);
      --shadow-lg:0 18px 56px rgba(0,0,0,.48),0 6px 18px rgba(0,0,0,.3);
      --radius-sm:10px;
      --radius:16px;
      --radius-lg:22px;
      --radius-xl:28px;
    }

    /* ===== BASE ===== */
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
      font-size:14.5px;
      line-height:1.5;
      -webkit-font-smoothing:antialiased;
    }
    button,input,textarea,select{font:inherit}
    button{border:0;cursor:pointer}

    /* ===== INPUTS ===== */
    input,textarea{
      width:100%;
      min-height:44px;
      border:1.5px solid var(--line);
      border-radius:var(--radius-sm);
      background:var(--card2);
      color:var(--text);
      padding:10px 13px;
      outline:none;
      transition:border-color .15s,box-shadow .15s;
      font-size:14px;
    }
    input:focus,textarea:focus{
      border-color:var(--blue);
      box-shadow:0 0 0 3px var(--blue-light);
      background:var(--card);
    }

    /* ===== LAYOUT ===== */
    .app{max-width:480px;min-height:100vh;margin:auto;background:var(--bg);position:relative}
    .page{padding:14px 14px 100px}

    /* ===== HEADER / TOP BAR ===== */
    .top{
      position:sticky;top:0;z-index:10;
      background:var(--card);
      margin:-14px -14px 14px;
      padding:10px 14px;
      border-bottom:1.5px solid var(--line);
      display:flex;align-items:center;justify-content:space-between;gap:8px;
      min-width:0;
      box-shadow:0 2px 12px rgba(30,50,90,.06);
    }
    [data-theme="dark"] .top{background:var(--card);box-shadow:0 2px 14px rgba(0,0,0,.25)}
    .brand{min-width:0;flex:1}
    .title{
      font-size:16px;font-weight:800;letter-spacing:-.02em;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      color:var(--text);
    }
    .sub{
      font-size:11px;color:var(--muted);margin-top:1px;
      line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .row{display:flex;align-items:center;gap:5px;flex-wrap:nowrap;justify-content:flex-end;flex-shrink:0}
    .between{display:flex;align-items:center;justify-content:space-between;gap:10px}

    /* ===== GRID ===== */
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

    /* ===== CARDS ===== */
    .card{
      background:var(--card);
      border:1.5px solid var(--line);
      border-radius:var(--radius);
      padding:14px;
      box-shadow:var(--shadow);
    }

    /* ===== HERO CARD ===== */
    .hero{
      background:linear-gradient(135deg,var(--hero1) 0%,var(--hero2) 100%);
      color:#fff;
      border-radius:var(--radius-lg);
      padding:18px 18px 16px;
      box-shadow:var(--shadow-md);
      position:relative;
      overflow:hidden;
    }
    .hero::before{
      content:"";position:absolute;
      right:-28px;top:-28px;
      width:120px;height:120px;
      border-radius:50%;
      background:rgba(255,255,255,.07);
      pointer-events:none;
    }
    .hero::after{
      content:"";position:absolute;
      left:-18px;bottom:-18px;
      width:80px;height:80px;
      border-radius:50%;
      background:rgba(255,255,255,.05);
      pointer-events:none;
    }
    .hero .sub{color:rgba(255,255,255,.78);font-size:10.5px;margin-top:0;line-height:1.2}
    .hero .kicker{font-size:10px;line-height:1.1;margin:0 0 8px}
    .hero .big{font-size:26px;margin:0 0 10px;line-height:1.1;font-weight:800}
    .hero-meta-line{display:block;margin-top:2px;font-size:9.5px;line-height:1.3;white-space:nowrap;max-width:100%;overflow:hidden;text-overflow:ellipsis;opacity:.85}

    /* ===== TYPOGRAPHY ATOMS ===== */
    .kicker{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;font-weight:700;opacity:.8}
    .big{font-size:28px;font-weight:800;letter-spacing:-.03em;margin-top:4px;font-variant-numeric:tabular-nums}

    /* ===== STAT CARDS ===== */
    .stat{
      background:var(--card);
      border:1.5px solid var(--line);
      border-radius:var(--radius);
      padding:14px 13px;
      min-height:84px;
    }
    .stat-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:700;line-height:1.2}
    .stat-val{font-size:22px;font-weight:800;margin-top:7px;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
    .stat-foot{font-size:11px;color:var(--muted);margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    /* ===== BUTTONS ===== */
    .btn{
      min-height:40px;
      border-radius:var(--radius-sm);
      padding:9px 14px;
      background:var(--card);
      border:1.5px solid var(--line);
      color:var(--text);
      font-weight:700;
      font-size:13px;
      display:inline-flex;align-items:center;justify-content:center;gap:7px;
      text-decoration:none;
      transition:transform .12s,box-shadow .12s,background .12s,opacity .12s;
      letter-spacing:-.01em;
      line-height:1;
    }
    .btn:active{transform:scale(.96);opacity:.88}
    .primary{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 4px 14px rgba(59,110,240,.3)}
    .primary:active{box-shadow:0 2px 6px rgba(59,110,240,.2)}
    .danger{background:var(--red-light);border-color:var(--red-mid);color:var(--red)}
    .success{background:var(--green-light);border-color:var(--green-mid);color:var(--green)}
    .warn{background:var(--amber-light);border-color:var(--amber-mid);color:var(--amber)}
    .block{width:100%}
    .sm{min-height:30px;border-radius:8px;padding:5px 8px;font-size:11.5px}

    /* ===== PILLS / BADGES ===== */
    .pill{
      display:inline-flex;align-items:center;
      border:1.5px solid var(--line);
      border-radius:999px;
      padding:3px 9px;
      font-size:10.5px;font-weight:700;
      color:var(--muted);background:var(--card);
      white-space:nowrap;
      letter-spacing:.01em;
    }
    .pill.green{background:var(--green-light);color:var(--green);border-color:var(--green-mid)}
    .pill.red{background:var(--red-light);color:var(--red);border-color:var(--red-mid)}
    .pill.blue{background:var(--blue-light);color:var(--blue);border-color:var(--blue-mid)}
    .pill.amber{background:var(--amber-light);color:var(--amber);border-color:var(--amber-mid)}

    /* ===== LIST / ITEM ===== */
    .list{display:flex;flex-direction:column;gap:8px}
    .item{background:var(--card);border:1.5px solid var(--line);border-radius:var(--radius);padding:12px;display:flex;gap:10px;align-items:center;box-shadow:var(--shadow)}
    .main{min-width:0;flex:1}
    .item-title{font-weight:700;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .item-sub{font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.35}
    .amount{font-weight:800;font-size:14px;text-align:right;font-variant-numeric:tabular-nums}
    .icon{
      width:36px;height:36px;border-radius:12px;
      border:1.5px solid var(--line);
      background:var(--card2);
      color:var(--text);font-weight:800;
      display:inline-flex;align-items:center;justify-content:center;
      flex-shrink:0;
    }

    /* ===== FORM FIELDS ===== */
    .field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
    .label{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:700}
    .hint{font-size:11.5px;color:var(--muted);line-height:1.45}
    .empty{padding:20px;border:1.5px dashed var(--line2);border-radius:var(--radius);text-align:center;color:var(--muted);font-size:12.5px;background:var(--soft)}

    /* ===== BOTTOM NAV ===== */
    .nav{
      position:fixed;left:50%;bottom:calc(10px + var(--safe));
      transform:translateX(-50%);
      width:min(460px,calc(100% - 16px));
      height:66px;
      background:var(--nav);
      border:1.5px solid var(--line);
      box-shadow:var(--shadow-md);
      border-radius:24px;
      display:none;z-index:20;padding:6px;
    }
    .nav button{
      flex:1;border-radius:18px;background:transparent;
      color:var(--muted);font-size:10.5px;font-weight:700;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
      transition:background .15s,color .15s;
    }
    .nav button.active{background:var(--blue-light);color:var(--blue)}
    [data-theme="dark"] .nav button.active{background:rgba(92,138,245,.14);color:var(--blue)}
    .nav svg{width:20px;height:20px;stroke:currentColor;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}

    /* ===== FABs ===== */
    .fab{
      position:fixed;
      right:max(16px,calc((100% - 480px)/2 + 16px));
      bottom:calc(86px + var(--safe));
      width:56px;height:56px;
      border-radius:20px;
      background:var(--blue);color:#fff;
      font-size:28px;
      box-shadow:0 8px 28px rgba(59,110,240,.4);
      display:none;z-index:22;
      transition:transform .12s;
    }
    .fab:active{transform:scale(.95)}
    .absen-fab{
      position:fixed;
      right:max(16px,calc((100% - 480px)/2 + 16px));
      bottom:calc(152px + var(--safe));
      width:56px;height:56px;
      border-radius:20px;
      background:var(--green);color:#fff;font-weight:800;
      box-shadow:0 8px 28px rgba(24,168,90,.38);
      display:none;z-index:23;
      align-items:center;justify-content:center;flex-direction:column;
      gap:2px;padding:6px 4px 5px;line-height:1;
      transition:transform .12s;
    }
    .absen-fab span{display:block;font-size:9.5px;font-weight:800;letter-spacing:-.02em;line-height:1}
    .absen-fab svg{width:24px;height:24px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
    .absen-fab:active{transform:scale(.96)}

    /* ===== MODAL ===== */
    .modal-wrap{
      position:fixed;inset:0;
      background:rgba(13,20,34,.65);
      backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
      z-index:40;display:none;
      align-items:flex-start;justify-content:center;
      padding:72px 14px 14px;
    }
    .modal-wrap.show{display:flex}
    .modal{
      width:100%;max-width:440px;max-height:88vh;overflow:auto;
      background:var(--card);
      border:1.5px solid var(--line);
      border-radius:var(--radius-lg);
      padding:18px;
      box-shadow:var(--shadow-lg);
      animation:modalPop .18s cubic-bezier(.2,1,.3,1);
    }
    .modal.tx-modal{
      max-width:400px;max-height:76vh;
      border:1.5px solid var(--blue-mid);
      border-radius:var(--radius-xl);
      padding:12px;
      box-shadow:var(--shadow-lg);
    }
    .modal.tx-modal::before{
      content:"";display:block;
      width:36px;height:4px;border-radius:999px;
      background:var(--line2);margin:2px auto 10px;
    }
    .modal-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:12px}
    .modal.tx-modal .modal-head{
      align-items:center;
      background:linear-gradient(135deg,var(--hero1),var(--hero2));
      color:#fff;
      margin:-2px -2px 12px;padding:12px 14px;
      border-radius:calc(var(--radius-xl) - 4px) calc(var(--radius-xl) - 4px) var(--radius) var(--radius);
      box-shadow:0 8px 24px rgba(42,91,215,.28);
    }
    .modal-title{font-size:17px;font-weight:800;letter-spacing:-.01em}
    .modal.tx-modal .modal-title{font-size:15.5px;letter-spacing:-.02em}
    .modal.tx-modal .icon{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.3);color:#fff;width:30px;height:30px;border-radius:10px}
    .modal-actions{display:flex;gap:8px;margin-top:12px}
    .modal-actions>*{flex:1}
    .modal.tx-modal .modal-actions{
      position:sticky;bottom:-12px;
      background:linear-gradient(180deg,rgba(255,255,255,0),var(--card) 26%);
      padding-top:14px;padding-bottom:4px;
    }
    [data-theme="dark"] .modal.tx-modal .modal-actions{background:linear-gradient(180deg,rgba(22,31,48,0),var(--card) 26%)}
    .modal.tx-modal .btn{min-height:42px;border-radius:12px}
    .modal.tx-modal .field{margin-bottom:10px}
    .modal.tx-modal input{min-height:42px;border-radius:12px}

    /* ===== TX CHIP ===== */
    .tx-chip{
      display:flex;align-items:center;justify-content:space-between;gap:8px;
      margin-bottom:10px;padding:8px 12px;
      border-radius:var(--radius-sm);
      background:var(--blue-light);border:1.5px solid var(--blue-mid);
      color:var(--blue);font-size:11px;font-weight:700;
    }
    [data-theme="dark"] .tx-chip{background:rgba(92,138,245,.13);border-color:rgba(92,138,245,.25);color:var(--blue)}
    .tx-chip span{white-space:nowrap}
    .tx-chip b{font-variant-numeric:tabular-nums}
    .tx-amount-input{letter-spacing:-.04em}
    .tx-note-mini{
      font-size:11px;color:var(--muted);line-height:1.4;
      padding:8px 11px;border-radius:10px;
      background:var(--soft);border:1.5px dashed var(--line2);
    }

    /* ===== ANIMATIONS ===== */
    @keyframes modalPop{from{transform:scale(.93) translateY(14px);opacity:.2}to{transform:scale(1) translateY(0);opacity:1}}

    /* ===== TOAST ===== */
    .toast{
      position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:80;
      background:var(--text);color:var(--bg);
      border-radius:999px;padding:10px 18px;
      font-weight:700;font-size:12.5px;
      display:none;max-width:calc(100% - 24px);text-align:center;
      box-shadow:var(--shadow-md);
    }
    .toast.show{display:block}

    /* ===== LOADING OVERLAY ===== */
    .loading{position:fixed;inset:0;z-index:60;background:rgba(255,255,255,.6);display:none;align-items:center;justify-content:center}
    [data-theme="dark"] .loading{background:rgba(13,20,34,.55)}
    .spin{
      width:38px;height:38px;border-radius:50%;
      border:3.5px solid var(--line2);border-top-color:var(--blue);
      animation:spin .75s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ===== LOGIN PAGE ===== */
    .login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .login-card{width:100%;max-width:380px;display:flex;flex-direction:column;gap:12px}

    /* ===== MISC ===== */
    .member{color:var(--blue)}
    .bonus-note{font-size:11px;color:var(--muted);margin-top:6px}
    .bonus-refresh-note{
      display:flex;align-items:center;gap:9px;
      font-size:10.5px;color:var(--amber);
      line-height:1.45;margin:6px 0 0;
      padding:10px 13px;border-radius:var(--radius-sm);
      background:var(--amber-light);border:1.5px solid var(--amber-mid);
    }
    [data-theme="dark"] .bonus-refresh-note{color:var(--amber)}
    .note-alert-icon{
      width:20px;height:20px;min-width:20px;
      border-radius:999px;display:inline-flex;align-items:center;justify-content:center;
      background:var(--amber);color:#fff;
      font-size:12px;font-weight:800;line-height:1;
    }

    /* ===== MANUAL BONUS ALERT ===== */
    .manual-bonus-alert{
      margin-bottom:10px;border-color:var(--green-mid);
      background:linear-gradient(135deg,var(--green-light),var(--card));
      position:relative;overflow:hidden;
    }
    .manual-bonus-alert::before{
      content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--green);
    }
    .manual-bonus-alert .manual-bonus-ico{
      width:36px;height:36px;border-radius:12px;
      background:var(--green);color:#fff;
      display:inline-flex;align-items:center;justify-content:center;
      font-size:18px;font-weight:800;flex-shrink:0;
    }
    .manual-bonus-alert .stat-val{color:var(--green);font-size:21px;margin-top:3px}
    .manual-bonus-alert .btn{min-height:32px;border-radius:10px;font-size:11.5px;padding:5px 10px}
    [data-theme="dark"] .manual-bonus-alert{background:linear-gradient(135deg,var(--green-light),var(--card));border-color:var(--green-mid)}

    /* ===== ROLE CARDS ===== */
    .role-card{margin-bottom:10px;border-radius:var(--radius);padding:12px 14px;border:1.5px solid var(--line);background:var(--card);box-shadow:var(--shadow)}
    .role-card.staff{border-color:var(--green-mid);background:linear-gradient(135deg,var(--green-light),var(--card))}
    .role-card.daily{border-color:var(--blue-mid);background:linear-gradient(135deg,var(--blue-light),var(--card))}
    [data-theme="dark"] .role-card.staff{background:linear-gradient(135deg,var(--green-light),var(--card));border-color:var(--green-mid)}
    [data-theme="dark"] .role-card.daily{background:linear-gradient(135deg,var(--blue-light),var(--card));border-color:var(--blue-mid)}
    .role-title{font-size:13.5px;font-weight:800}
    .lock-status{display:inline-flex;align-items:center;gap:7px}
    .lock-status .lock-ico{
      width:28px;height:28px;border-radius:10px;
      display:inline-flex;align-items:center;justify-content:center;
      font-size:14px;font-weight:800;
    }
    .lock-status.open .lock-ico{background:var(--green-light);color:var(--green);border:1.5px solid var(--green-mid)}
    .lock-status.locked .lock-ico{background:var(--red-light);color:var(--red);border:1.5px solid var(--red-mid)}
    .trx-head-status{
      min-height:28px;border-radius:8px;padding:4px 7px;
      border:1.5px solid var(--line);background:var(--card);
      display:inline-flex;align-items:center;gap:5px;
      font-size:10.5px;font-weight:700;white-space:nowrap;
    }
    .trx-head-status .lock-ico{width:18px;height:18px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:11px}
    .trx-head-status.open{color:var(--green);border-color:var(--green-mid);background:var(--green-light)}
    .trx-head-status.locked{color:var(--red);border-color:var(--red-mid);background:var(--red-light)}
    .role-desc{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.4}
    .closing-bonus-card{margin-bottom:10px;border-color:var(--green-mid);background:linear-gradient(135deg,var(--green-light),var(--card))}
    [data-theme="dark"] .closing-bonus-card{background:linear-gradient(135deg,var(--green-light),var(--card));border-color:var(--green-mid)}

    /* ===== SYNC BAR ===== */
    .syncbar{
      margin-bottom:10px;padding:10px 13px;
      border:1.5px solid var(--line);border-radius:var(--radius-sm);
      background:var(--card);
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      color:var(--muted);font-size:11.5px;
      box-shadow:var(--shadow);
    }
    .syncbar b{color:var(--text)}
    .syncbar .btn{min-height:28px;padding:5px 10px;font-size:11px;border-radius:8px}
    .hero-sync{
      margin-top:10px;padding-top:9px;
      border-top:1px solid rgba(255,255,255,.2);
      display:flex;align-items:center;justify-content:space-between;gap:8px;
      color:rgba(255,255,255,.88);font-size:11px;line-height:1.25;
    }
    .hero-sync b{color:#fff}
    .hero-sync-btn{
      min-height:26px;border-radius:9px;padding:4px 9px;
      background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);
      color:#fff;font-size:10.5px;font-weight:700;
      transition:background .12s;
    }
    .hero-sync-btn:active{transform:scale(.96)}
    .hero-sync-error{margin-top:3px;color:#fecaca;font-size:10.5px}
    .sync-pending{border-color:var(--amber-mid);background:var(--amber-light);color:var(--amber)}
    .pending-tag{
      display:inline-flex;margin-top:4px;border-radius:999px;
      padding:2px 7px;background:var(--amber-light);
      color:var(--amber);font-size:9.5px;font-weight:700;
      border:1.5px solid var(--amber-mid);
    }
    .fail-tag{
      display:inline-flex;margin-top:4px;border-radius:999px;
      padding:2px 7px;background:var(--red-light);
      color:var(--red);font-size:9.5px;font-weight:700;
      border:1.5px solid var(--red-mid);
    }

    /* ===== ATT STATUS CARDS ===== */
    .att-status{position:relative;overflow:hidden}
    .att-status .stat-label,.att-status .stat-foot{color:inherit;opacity:.8}
    .att-status .stat-val{color:inherit}
    .att-status.ok{background:var(--green-light);border-color:var(--green-mid);color:var(--green)}
    .att-status.wait{background:var(--red-light);border-color:var(--red-mid);color:var(--red)}
    .att-status.closed{background:var(--amber-light);border-color:var(--amber-mid);color:var(--amber)}

    /* ===== BONUS PLUS CARD ===== */
    .bonus-plus-card{position:relative;padding-right:62px}
    .bonus-plus-head{display:block;margin-bottom:4px}
    .refresh-icon-btn{
      position:absolute;right:13px;top:50%;transform:translateY(-50%);
      width:38px;height:38px;border-radius:12px;
      border:1.5px solid var(--blue-mid);background:var(--blue-light);
      color:var(--blue);
      display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;
      transition:transform .12s;
    }
    .refresh-icon-btn:active{transform:translateY(-50%) scale(.94)}
    .refresh-icon-btn svg{width:18px;height:18px;stroke:currentColor;stroke-width:2.3;fill:none;stroke-linecap:round;stroke-linejoin:round}

    /* ===== AVG ATTENDANCE CARD ===== */
    .avg-att-card{margin:14px 0 16px;border-color:var(--blue-mid);background:linear-gradient(135deg,var(--blue-light),var(--card));overflow:hidden}
    .avg-att-card .between{align-items:center}
    .avg-att-head{display:flex;align-items:center;gap:10px;min-width:0}
    .avg-att-ico{
      width:38px;height:38px;min-width:38px;
      border-radius:13px;border:1.5px solid var(--blue-mid);
      background:var(--blue-light);color:var(--blue);
      display:inline-flex;align-items:center;justify-content:center;
      font-size:17px;font-weight:800;
    }
    .avg-att-metric{min-width:86px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:5px}
    .avg-att-metric .stat-val{margin:0;line-height:1.05;letter-spacing:-.03em}
    .avg-att-metric .pill{justify-content:center}
    .avg-good{border-color:var(--green-mid);background:linear-gradient(135deg,var(--green-light),var(--card))}
    .avg-warn{border-color:var(--amber-mid);background:linear-gradient(135deg,var(--amber-light),var(--card))}
    .avg-good .stat-val{color:var(--green)}
    .avg-warn .stat-val{color:var(--amber)}
    [data-theme="dark"] .avg-att-card{background:linear-gradient(135deg,var(--blue-light),var(--card));border-color:var(--blue-mid)}
    [data-theme="dark"] .avg-good{background:linear-gradient(135deg,var(--green-light),var(--card));border-color:var(--green-mid)}
    [data-theme="dark"] .avg-warn{background:linear-gradient(135deg,var(--amber-light),var(--card));border-color:var(--amber-mid)}

    /* ===== TX TABLE ===== */
    .tx-table{display:flex;flex-direction:column;gap:8px}
    .tx-head,.tx-row{display:grid;grid-template-columns:minmax(0,1fr) 96px 90px;align-items:center;gap:7px}
    .tx-head{padding:0 5px 4px;color:var(--muted);font-size:10.5px;text-transform:uppercase;font-weight:700;letter-spacing:.04em}
    .tx-head span:nth-child(2),.tx-nominal{text-align:right}
    .tx-head span:nth-child(3),.tx-action{text-align:right}
    .tx-row{
      background:var(--card);border:1.5px solid var(--line);
      border-radius:var(--radius);
      padding:11px 9px 11px 13px;
      box-shadow:var(--shadow);
      transition:box-shadow .15s;
    }
    .tx-title{font-weight:700;font-size:13.5px;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tx-meta{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.3}
    .tx-nominal{font-weight:800;font-size:13.5px;font-variant-numeric:tabular-nums;white-space:nowrap;color:var(--text)}
    .tx-action{min-width:0}
    .tx-action-buttons{display:flex;gap:5px;justify-content:flex-end;align-items:center}
    .tx-del-btn,.tx-print-btn{min-height:28px;padding:4px 7px;font-size:10.5px;border-radius:8px}
    .tx-print-btn{min-width:32px}
    .tx-action .pill{padding:3px 7px;font-size:9.5px}

    @media(max-width:360px){
      .tx-head,.tx-row{grid-template-columns:minmax(0,1fr) 80px 72px;gap:4px}
      .tx-row{padding:9px 7px 9px 10px}
      .tx-title{font-size:12.5px}
      .tx-meta{font-size:10px}
      .tx-nominal{font-size:12.5px}
      .tx-del-btn{font-size:0;width:30px;padding:0}
      .tx-del-btn::before{content:"🗑";font-size:13px}
      .tx-print-btn{width:30px;padding:0}
    }

    @media(max-width:360px){
      .page{padding-left:10px;padding-right:10px}
      .top{margin-left:-10px;margin-right:-10px;padding:8px 10px}
      .big{font-size:23px}
      .hero{padding:14px 14px;border-radius:var(--radius)}
      .hero .big{font-size:22px;margin-bottom:8px}
      .hero .kicker{font-size:9.5px;margin-bottom:7px}
      .hero .sub{font-size:9px}
      .hero-meta-line{font-size:8.8px}
      .hero-sync{margin-top:7px;padding-top:7px;font-size:10px}
      .hero-sync-btn{min-height:24px;font-size:10px;padding:3px 7px}
      .stat-val{font-size:19px}
      .nav span{display:none}
      .nav{height:58px}
      .nav svg{width:22px;height:22px}
      .item{padding:10px}
      .title{font-size:14.5px}
      .sub{font-size:9.5px}
      .row{gap:4px}
      .sm{font-size:10.5px;padding:4px 6px;min-height:28px}
      .member{max-width:54px;overflow:hidden}
      .trx-head-status{font-size:0;padding:4px 6px}
      .trx-head-status .lock-ico{margin:0}
    }

    /* ===== FIRST TX PARTY ===== */
    .first-tx-party{position:fixed;inset:0;z-index:95;display:flex;align-items:center;justify-content:center;background:rgba(13,20,34,.25);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);pointer-events:auto;opacity:0;transition:opacity .2s ease;padding:18px}
    .first-tx-party.show{opacity:1}
    .first-tx-box{position:relative;width:min(340px,calc(100% - 28px));border-radius:28px;padding:20px 18px 18px;text-align:center;color:#fff;background:linear-gradient(135deg,#2a5bd7,#22c55e);box-shadow:0 24px 72px rgba(13,20,34,.4);overflow:hidden;animation:firstTxPop .34s cubic-bezier(.2,1.2,.3,1)}
    .first-tx-box::before{content:"";position:absolute;inset:-40%;background:radial-gradient(circle,rgba(255,255,255,.4),transparent 58%);animation:firstTxGlow 1.7s ease-in-out infinite}
    .first-tx-emoji{position:relative;font-size:44px;line-height:1;animation:firstTxBounce .8s ease-in-out infinite}
    .first-tx-title{position:relative;font-size:19px;font-weight:800;letter-spacing:-.03em;margin-top:6px}
    .first-tx-sub{position:relative;font-size:12.5px;opacity:.9;margin-top:4px;line-height:1.4}
    .first-tx-amount{position:relative;font-size:27px;font-weight:800;margin-top:9px;font-variant-numeric:tabular-nums}
    .first-tx-close{position:relative;margin-top:13px;min-height:40px;border-radius:14px;padding:8px 18px;background:rgba(255,255,255,.92);color:#166534;border:1px solid rgba(255,255,255,.78);font-weight:800;box-shadow:0 10px 24px rgba(13,20,34,.18)}
    .first-tx-close:active{transform:scale(.97)}
    .first-tx-confetti i{position:absolute;left:50%;top:50%;width:7px;height:12px;border-radius:3px;background:#fff;opacity:0;animation:firstTxFly .95s ease-out forwards;animation-delay:var(--d)}
    .first-tx-confetti i:nth-child(3n){background:#fde047}
    .first-tx-confetti i:nth-child(3n+1){background:#86efac}
    .first-tx-confetti i:nth-child(3n+2){background:#bfdbfe}
    @keyframes firstTxPop{from{transform:scale(.72) translateY(18px);opacity:.25}to{transform:scale(1) translateY(0);opacity:1}}
    @keyframes firstTxGlow{0%,100%{transform:translate(-12%,-8%) rotate(0deg)}50%{transform:translate(12%,8%) rotate(18deg)}}
    @keyframes firstTxBounce{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-6px) rotate(4deg)}}
    @keyframes firstTxFly{0%{transform:translate(-50%,-50%) scale(.6) rotate(0deg);opacity:1}100%{transform:translate(var(--x),var(--y)) scale(1) rotate(var(--r));opacity:0}}
    @media(prefers-reduced-motion:reduce){.first-tx-box,.first-tx-emoji,.first-tx-box::before,.first-tx-confetti i{animation:none}.first-tx-party.show{opacity:1}}

    /* ===== MANUAL BONUS PARTY ===== */
    .manual-bonus-party{position:fixed;inset:0;z-index:96;display:flex;align-items:center;justify-content:center;background:rgba(13,20,34,.28);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);pointer-events:auto;opacity:0;transition:opacity .2s ease;padding:18px}
    .manual-bonus-party.show{opacity:1}
    .manual-bonus-box{position:relative;width:min(340px,calc(100% - 28px));border-radius:28px;padding:20px 18px 18px;text-align:center;color:#fff;background:linear-gradient(135deg,#18a85a,#f59e0b);box-shadow:0 24px 72px rgba(13,20,34,.42);overflow:hidden;animation:firstTxPop .34s cubic-bezier(.2,1.2,.3,1)}
    .manual-bonus-box::before{content:"";position:absolute;inset:-40%;background:radial-gradient(circle,rgba(255,255,255,.4),transparent 58%);animation:firstTxGlow 1.7s ease-in-out infinite}
    .manual-bonus-emoji{position:relative;font-size:46px;line-height:1;animation:firstTxBounce .8s ease-in-out infinite}
    .manual-bonus-title{position:relative;font-size:19px;font-weight:800;letter-spacing:-.03em;margin-top:6px}
    .manual-bonus-sub{position:relative;font-size:12.5px;opacity:.92;margin-top:4px;line-height:1.4}
    .manual-bonus-note{position:relative;font-size:15.5px;font-weight:800;opacity:.96;margin-top:7px;line-height:1.4}
    .manual-bonus-amount{position:relative;font-size:28px;font-weight:800;margin-top:9px;font-variant-numeric:tabular-nums}
    .manual-bonus-count{position:relative;display:inline-flex;margin-top:9px;border-radius:999px;padding:4px 10px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.28);font-size:11px;font-weight:700}
    .manual-bonus-close{position:relative;margin-top:13px;min-height:40px;border-radius:14px;padding:8px 18px;background:rgba(255,255,255,.92);color:#166534;border:1px solid rgba(255,255,255,.78);font-weight:800;box-shadow:0 10px 24px rgba(13,20,34,.18)}
    .manual-bonus-close:active{transform:scale(.97)}
    .manual-bonus-confetti i{position:absolute;left:50%;top:50%;width:7px;height:12px;border-radius:3px;background:#fff;opacity:0;animation:firstTxFly .95s ease-out forwards;animation-delay:var(--d)}
    .manual-bonus-confetti i:nth-child(3n){background:#fde047}
    .manual-bonus-confetti i:nth-child(3n+1){background:#86efac}
    .manual-bonus-confetti i:nth-child(3n+2){background:#bbf7d0}
    @media(prefers-reduced-motion:reduce){.manual-bonus-box,.manual-bonus-emoji,.manual-bonus-box::before,.manual-bonus-confetti i{animation:none}.manual-bonus-party.show{opacity:1}}

    /* ===== HEADER GUIDE CARD ===== */
    .header-guide-card{margin:10px 0;background:linear-gradient(135deg,var(--soft),var(--card));overflow:hidden}
    .header-guide-bonus-quote{margin-top:5px;font-size:11.5px;line-height:1.55;font-weight:700;color:var(--text);letter-spacing:.01em}
    .header-guide-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    .header-guide-item{display:flex;align-items:flex-start;gap:8px;border:1.5px solid var(--line);border-radius:12px;background:var(--soft);padding:9px;min-width:0}
    .header-guide-ico{width:30px;height:30px;min-width:30px;border-radius:10px;border:1.5px solid var(--line);background:var(--card);display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--blue)}
    .header-guide-title{font-size:11.5px;font-weight:800;line-height:1.2;color:var(--text)}
    .header-guide-desc{font-size:10.5px;color:var(--muted);line-height:1.3;margin-top:3px}
    [data-theme="dark"] .header-guide-card{background:linear-gradient(135deg,rgba(92,138,245,.08),var(--card))}
    @media(max-width:360px){.header-guide-grid{grid-template-columns:1fr}.header-guide-card{padding:11px}.header-guide-bonus-quote{font-size:11px;line-height:1.48}.header-guide-item{padding:8px}.header-guide-desc{font-size:10px}}
    .header-guide-card.is-compact{padding:10px 12px;margin:8px 0;background:linear-gradient(135deg,var(--blue-light),var(--card));border-color:var(--blue-mid)}
    .header-guide-open-btn{min-height:34px;border-radius:10px;padding:6px 11px;background:var(--blue-light);border:1.5px solid var(--blue-mid);color:var(--blue);font-size:11.5px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;gap:5px;white-space:nowrap}
    .header-guide-open-btn:active{transform:scale(.97)}
    .header-guide-mini-row{display:flex;align-items:center;gap:9px;min-width:0;flex:1}
    .header-guide-mini-ico{width:32px;height:32px;min-width:32px;border-radius:11px;background:var(--blue-light);border:1.5px solid var(--blue-mid);color:var(--blue);display:inline-flex;align-items:center;justify-content:center;font-size:14px;font-weight:800}
    .header-guide-modal-note{margin-bottom:10px;padding:10px 12px;border-radius:12px;border:1.5px solid var(--green-mid);background:var(--green-light);color:var(--text);font-size:11.5px;line-height:1.5;font-weight:700}
    [data-theme="dark"] .header-guide-card.is-compact{background:linear-gradient(135deg,var(--blue-light),var(--card));border-color:var(--blue-mid)}
    [data-theme="dark"] .header-guide-open-btn,[data-theme="dark"] .header-guide-mini-ico{background:var(--blue-light);border-color:var(--blue-mid);color:var(--blue)}
    [data-theme="dark"] .header-guide-modal-note{background:var(--green-light);border-color:var(--green-mid)}
    @media(max-width:360px){.header-guide-card.is-compact{padding:9px 10px}.header-guide-open-btn{font-size:11px;padding:6px 9px}.header-guide-mini-ico{width:30px;height:30px;min-width:30px}.header-guide-card.is-compact .hint{font-size:10.5px}}

    /* ===== STAFF HOME NOTE ===== */
    .staff-home-note-card{margin:8px 0 0;padding:11px 13px;border-color:var(--blue-mid);background:linear-gradient(135deg,var(--blue-light),var(--card));overflow:visible}
    .staff-home-note-main{display:flex;align-items:flex-start;gap:9px;min-width:0}
    .staff-home-note-ico{width:32px;height:32px;min-width:32px;border-radius:11px;background:var(--blue-light);border:1.5px solid var(--blue-mid);color:var(--blue);display:inline-flex;align-items:center;justify-content:center;align-self:flex-start;line-height:1;font-size:14px;font-weight:800;margin-top:1px}
    .staff-home-note-title{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;font-weight:800;color:var(--blue);line-height:1.1}
    .staff-home-note-text{font-size:12px;line-height:1.5;color:var(--text);font-weight:600;margin-top:4px;display:block;max-height:none;overflow:visible;white-space:pre-wrap;word-break:break-word;overflow-wrap:anywhere}
    .staff-note-link{color:var(--blue);font-weight:800;text-decoration:underline;text-underline-offset:3px;word-break:normal;overflow-wrap:anywhere}
    .staff-note-link::after{content:'↗';font-size:9px;margin-left:3px;text-decoration:none;display:inline-block}
    .staff-home-note-meta{font-size:10px;color:var(--muted);font-weight:700;margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    [data-theme="dark"] .staff-home-note-card{background:linear-gradient(135deg,var(--blue-light),var(--card));border-color:var(--blue-mid)}
    [data-theme="dark"] .staff-home-note-ico{background:var(--blue-light);border-color:var(--blue-mid);color:var(--blue)}
    @media(max-width:360px){.staff-home-note-card{padding:9px 11px}.staff-home-note-text{font-size:11.5px;line-height:1.45}.staff-home-note-ico{width:30px;height:30px;min-width:30px}}

    /* ===== RECEIPT PREVIEW ===== */
    .receipt-preview-box{margin:9px 0 0;border:1.5px dashed var(--line2);border-radius:var(--radius-sm);background:var(--soft);padding:12px;max-height:50vh;overflow:auto}
    .receipt-preview-text{font-family:ui-monospace,SFMono-Regular,Consolas,'Courier New',monospace;font-size:12px;line-height:1.4;white-space:pre-wrap;color:var(--text)}
    .receipt-preview-note{font-size:11.5px;color:var(--muted);line-height:1.4;margin:9px 0 0}
    .receipt-modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:11px}
    .receipt-modal-actions .btn{min-height:40px;border-radius:12px;font-size:12.5px}
    @media(max-width:360px){.receipt-modal-actions{grid-template-columns:1fr}.receipt-preview-text{font-size:11.5px}}

    /* ===== TX PRODUCT INPUT ===== */
    .tx-product-input{width:100%;min-height:96px;border:1.5px solid var(--line);border-radius:12px;background:var(--card2);color:var(--text);padding:11px 13px;outline:none;resize:vertical;font:inherit;font-size:13.5px;line-height:1.42;white-space:pre-wrap;transition:border-color .15s,box-shadow .15s}
    .tx-product-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-light);background:var(--card)}
    .modal.tx-modal textarea.tx-product-input{min-height:96px;border-radius:12px}
    .tx-title{white-space:pre-wrap!important;overflow:visible!important;text-overflow:clip!important;word-break:break-word}
    .first-tx-sub{white-space:pre-wrap;word-break:break-word}
  

    /* ===== UI COMPACT 80% SAFE - NO HORIZONTAL OVERFLOW =====
       Fokus: kecilkan tampilan konten ±80%, nav bawah tetap ukuran asli,
       tanpa menyentuh script / fitur / logika aplikasi. */
    html,body{width:100%;max-width:100%;overflow-x:hidden;font-size:11.6px!important}
    .app{width:100%!important;max-width:480px!important;overflow-x:hidden!important}
    .page{padding:11px 11px 100px!important;overflow-x:hidden!important}
    *,*::before,*::after{box-sizing:border-box}
    .card,.hero,.stat,.item,.role-card,.syncbar,.avg-att-card,.header-guide-card,.staff-home-note-card,.manual-bonus-alert,.closing-bonus-card{max-width:100%!important;min-width:0!important}
    .grid2{grid-template-columns:minmax(0,1fr) minmax(0,1fr)!important;gap:8px!important;width:100%!important;min-width:0!important}
    .grid2>*{min-width:0!important;max-width:100%!important}
    .between,.row,.main,.brand,.avg-att-head,.header-guide-mini-row,.staff-home-note-main{min-width:0!important;max-width:100%!important}

    /* Header */
    .top{margin:-11px -11px 11px!important;padding:8px 11px!important;gap:6px!important;max-width:calc(100% + 22px)!important;overflow:hidden!important}
    .title{font-size:13px!important;line-height:1.15!important}
    .sub{font-size:9px!important;line-height:1.25!important}
    .row{gap:4px!important;flex-shrink:1!important}
    .member{max-width:72px!important;overflow:hidden!important;text-overflow:ellipsis!important}
    .trx-head-status{min-height:24px!important;font-size:9px!important;padding:3px 6px!important;gap:4px!important}
    .trx-head-status .lock-ico{width:16px!important;height:16px!important;border-radius:5px!important;font-size:9px!important}

    /* Card / layout umum */
    .card{border-radius:13px!important;padding:11px!important}

function clearLocalDeviceUser(){try{localStorage.removeItem(DEVICE_USER_KEY)}catch(e){}}
function shortDevice(id){return String(id||'').slice(-6).toUpperCase()||'-'}
async function isLocalDeviceStillOwnedBy(boundUser,deviceId){
  const bound=key(boundUser);
  if(!bound)return false;
  try{
    const snap=await getDocFromServer(doc(db,'users',bound));
    if(!snap.exists())return false;
    const raw=snap.data()||{};
    const data={id:snap.id,username:raw.username||snap.id,...raw};
    if(isDailyUser(data)||data.active===false||deleted(data))return false;
    return String(data.deviceId||'').trim()===deviceId && data.deviceLocked!==false;
  }catch(e){
    console.warn('device owner check skipped',e?.code||e?.message||e);
    return true;
  }
}
async function verifyDeviceLockForLogin(userData,username){
  const u=key(username||userData?.username||userData?.id), deviceId=getDeviceId(), bound=localDeviceUser();
  if(isDailyUser(userData)){
    try{
      await setDoc(doc(db,'users',u),{
        deviceId:'',
        deviceLocked:false,
        deviceUser:'',
        deviceApp:'staff',
        deviceLabel:'Harian bebas login',
        devicePolicy:'open_any_device',
        deviceLastLoginAt:serverTimestamp(),
        deviceLastLoginAtMs:Date.now()
      },{merge:true});
    }catch(e){console.warn('daily device free update skipped',e?.code||e)}
    return {ok:true,deviceId:'',exempt:true};
  }
  if(bound&&bound!==u){
    const stillOwned=await isLocalDeviceStillOwnedBy(bound,deviceId);
    if(stillOwned)return {ok:false,msg:`Perangkat ini masih terdaftar untuk user ${bound}. Reset device user tersebut dulu dari admin.`};
    clearLocalDeviceUser();
  }
  const serverDeviceId=String(userData?.deviceId||'').trim();
  if(serverDeviceId&&serverDeviceId!==deviceId)return {ok:false,msg:'Akun ini sudah terdaftar di perangkat lain. Hubungi admin untuk reset device.'};
  try{
    await setDoc(doc(db,'users',u),{
      deviceId,
      deviceLocked:true,
      deviceUser:u,
      deviceApp:'staff',
      deviceLabel:'Staff App '+shortDevice(deviceId),
      deviceUserAgent:String(navigator.userAgent||'').slice(0,180),
      devicePlatform:String(navigator.platform||'').slice(0,80),
      deviceLastLoginAt:serverTimestamp(),
      deviceLastLoginAtMs:Date.now(),
      deviceLockedAt:serverDeviceId?(userData?.deviceLockedAt||serverTimestamp()):serverTimestamp(),
      deviceLockedAtMs:Number(userData?.deviceLockedAtMs||Date.now())
    },{merge:true});
    bindLocalDeviceUser(u);
    return {ok:true,deviceId};
  }catch(e){
    console.error('device lock failed',e);
    return {ok:false,msg:isPermissionError(e)?'Akses Firebase menolak kunci perangkat. Hubungi admin.':'Gagal mengunci perangkat. Pastikan internet aktif.'};
  }
}

function clearSessionAndRender(msg){
  try{localStorage.removeItem(SESSION);localStorage.removeItem(LEGACY_SESSION)}catch(e){}
  stopDeviceSessionWatch();
  clearStaffRealtime();
  state.user=null;state.pos=null;state.syncError='';state.lastSyncMs=0;state.data={tx:[],att:[],closings:[],manual:[],bonus:{...DEFAULT_BONUS},headerGuideNote:DEFAULT_HEADER_GUIDE_NOTE,staffDailyNote:{note:DEFAULT_STAFF_DAILY_NOTE,enabled:true},receiptSettings:{...DEFAULT_RECEIPT_TEXT_SETTINGS}};
  if(msg)toast(msg);
  renderLogin();
}
function isDeviceSessionInvalid(fresh){
  if(!fresh||isDailyUser(fresh))return '';
  const serverReset=Number(fresh.deviceResetAtMs||0), localReset=Number(state.user?.deviceResetAtMs||0);
  if(serverReset&&serverReset>localReset)return 'Device akun ini sudah direset admin. Silakan login ulang.';
  const serverDeviceId=String(fresh.deviceId||'').trim(), localDeviceId=getDeviceId();
  if(serverDeviceId&&serverDeviceId!==localDeviceId)return 'Akun ini sudah pindah ke perangkat lain. Silakan hubungi admin.';
  return '';
}
async function validateCurrentDeviceSession({silent=true,force=false}={}){
  if(!state.user||isDailyUser(state.user))return true;
  const nowMs=Date.now();
  if(!force&&lastDeviceSessionCheckAt&&nowMs-lastDeviceSessionCheckAt<DEVICE_SESSION_ACTION_CACHE_MS)return true;
  try{
    const u=key(state.user.username), snap=await getDocFromServer(doc(db,'users',u));
    lastDeviceSessionCheckAt=Date.now();
    if(!snap.exists()){clearSessionAndRender('Akun sudah tidak valid');return false}
    const raw=snap.data()||{}, fresh={id:snap.id,username:raw.username||snap.id,...raw};
    if(isAdmin(fresh)||fresh.active===false||deleted(fresh)){clearSessionAndRender('Akun sudah nonaktif / tidak valid');return false}
    const reason=isDeviceSessionInvalid(fresh);
    if(reason){clearSessionAndRender(reason);return false}
    return true;
  }catch(e){
    lastDeviceSessionCheckAt=Date.now();
    if(!silent)console.warn('device session check skipped',e?.code||e?.message||e);
    return true;
  }
}
function startDeviceSessionWatch(){
  stopDeviceSessionWatch();
  if(!state.user||isDailyUser(state.user))return;
  deviceSessionTimer=setInterval(()=>validateCurrentDeviceSession({silent:true}),DEVICE_SESSION_CHECK_MS);
}
function stopDeviceSessionWatch(){
  if(deviceSessionTimer){clearInterval(deviceSessionTimer);deviceSessionTimer=null;}
}
function rp(v){return Number(v||0).toLocaleString('id-ID')}
function parts(d=new Date()){return Object.fromEntries(new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Jakarta',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hourCycle:'h23'}).formatToParts(d).map(p=>[p.type,p.value]))}
function todayKey(d=new Date()){const p=parts(d);return `${p.year}-${p.month}-${p.day}`}
function monthKey(d=new Date()){return todayKey(d).slice(0,7)}
function timeNow(){const p=parts();return `${p.hour}:${p.minute}`}
function dateID(k){if(!k)return '-';const [y,m,d]=String(k).split('-');return `${d}/${m}/${y}`}
function monthID(k){if(!k)return '-';const [y,m]=String(k).split('-');return `${m}/${y}`}
function ms(r){const n=Number(r?.createdAtMs||r?.updatedAtMs||r?.deletedAtMs||0);if(n)return n;const t=r?.createdAt||r?.updatedAt||r?.deletedAt;if(t?.toMillis)return t.toMillis();if(t?.seconds)return t.seconds*1000;return 0}
function timeID(m){if(!m)return '--:--';const p=parts(new Date(m));return `${p.hour}:${p.minute}`}
function deleted(x){return x?.deleted===true||x?.deleted==='true'}
function sortDesc(a){return [...(a||[])].sort((x,y)=>ms(y)-ms(x))}
function isAdmin(u){return key(u?.role)==='admin'||ADMIN.includes(key(u?.username||u?.id))}
function isDailyUser(user=state.user){const r=key(user?.role);return r==='harian'||r==='daily'||r==='karyawan_harian'}
function isDaily(){return isDailyUser(state.user)}
function hasBonusValue(value){return value!==undefined&&value!==null&&String(value).trim()!==''}
function globalTransactionBonusRate(){const r=Number(state.data.bonus?.transactionBonusRate);return Number.isFinite(r)&&r>=0?r:DEFAULT_BONUS.transactionBonusRate}
function globalClosingBonusPerMinute(){const n=Number(state.data.bonus?.closingBonusPerMinute);return Number.isFinite(n)&&n>=0?n:DEFAULT_BONUS.closingBonusPerMinute}
function userTransactionBonusRate(user=state.user){
  const u=user||{};
  if(hasBonusValue(u.transactionBonusRate)){const r=Number(u.transactionBonusRate);if(Number.isFinite(r)&&r>=0)return r}
  if(hasBonusValue(u.transactionBonusPercent)){const p=Number(u.transactionBonusPercent);if(Number.isFinite(p)&&p>=0)return p/100}
  if(isDailyUser(u)){
    const r=Number(u.dailyBonusRate);if(Number.isFinite(r)&&r>=0)return r;
    const p=Number(u.dailyBonusPercent);if(Number.isFinite(p)&&p>=0)return p/100;
  }
  return globalTransactionBonusRate();
}
function userTransactionBonusPercent(user=state.user){return Number((userTransactionBonusRate(user)*100).toFixed(3))}
function userClosingBonusPerMinute(user=state.user){
  const u=user||{};
  if(isDailyUser(u))return 0;
  if(hasBonusValue(u.closingBonusPerMinute)){const n=Number(u.closingBonusPerMinute);if(Number.isFinite(n)&&n>=0)return n}
  return globalClosingBonusPerMinute();
}
function txBonusRate(t){
  if(t){
    if(hasBonusValue(t.bonusRate)){const r=Number(t.bonusRate);if(Number.isFinite(r)&&r>=0)return r}
    if(hasBonusValue(t.transactionBonusRate)){const r=Number(t.transactionBonusRate);if(Number.isFinite(r)&&r>=0)return r}
    if(hasBonusValue(t.bonusPercent)){const p=Number(t.bonusPercent);if(Number.isFinite(p)&&p>=0)return p/100}
    if(hasBonusValue(t.transactionBonusPercent)){const p=Number(t.transactionBonusPercent);if(Number.isFinite(p)&&p>=0)return p/100}
  }
  return userTransactionBonusRate();
}
function txBonusValue(t){return Math.round(Number(t?.amount||0)*txBonusRate(t))}
function txBonusSum(list){return (list||[]).reduce((sum,t)=>sum+txBonusValue(t),0)}
function roleLabel(){return isDaily()?'Karyawan Harian':'Karyawan Staff'}
function roleCard(){const locked=isClosedToday()||(!isDaily()&&!todayAtt());const label=locked?'Terkunci':'Terbuka';const cls=locked?'red':'green';const note=isClosedToday()?'sudah closing':(isDaily()?'siap transaksi':(todayAtt()?'sudah absen':'belum absen'));const ico=locked?'🔒':'🔓';return `<div class="role-card ${locked?'locked':'open'}"><div class="between"><div><div class="role-title">Status Transaksi</div><div class="hint" style="margin-top:3px">${note}</div></div><div class="lock-status ${locked?'locked':'open'}"><span class="lock-ico">${ico}</span><span class="pill ${cls}">${label}</span></div></div></div>`}
function headerTxStatus(){if(!state.user)return '';const locked=isClosedToday()||(!isDaily()&&!todayAtt());const label=locked?'Terkunci':'Terbuka';const ico=locked?'🔒':'🔓';return `<span class="trx-head-status ${locked?'locked':'open'}"><span class="lock-ico">${ico}</span>${label}</span>`}
function txDate(t){return String(t.dateKey||(ms(t)?todayKey(new Date(ms(t))):'')).slice(0,10)}
function txMonth(t){return String(t.monthKey||txDate(t).slice(0,7))}
function attDate(a){return String(a.dateKey||(ms(a)?todayKey(new Date(ms(a))):'')).slice(0,10)}
function attendanceDocId(user,dateKey=todayKey()){return 'staffatt_'+key(user)+'_'+String(dateKey||todayKey()).slice(0,10)}
function dedupeAttendanceRows(rows){
  const map=new Map();
  sortDesc((rows||[]).filter(a=>a&&!deleted(a))).forEach(a=>{
    const u=key(a.user||state.user?.username), d=attDate(a), k=u+'_'+d;
    if(!u||!d)return;
    if(!map.has(k))map.set(k,a);
  });
  return sortDesc([...map.values()]);
}
function showLoad(v){state.busy=!!v;$('loading').style.display=v?'flex':'none'}
function toast(msg){const t=$('toast');t.textContent=msg;t.className='toast show';setTimeout(()=>t.className='toast',2100)}
function manualSeenKey(){return MANUAL_BONUS_SEEN+'_'+key(state.user?.username||'guest')}
function getManualSeen(){try{const raw=JSON.parse(localStorage.getItem(manualSeenKey())||'[]');return new Set(Array.isArray(raw)?raw.map(String):[])}catch(e){return new Set()}}
function saveManualSeen(set){try{localStorage.setItem(manualSeenKey(),JSON.stringify([...set].slice(-600)))}catch(e){}}
function manualBonusDate(b){
  const raw=String(b?.dateKey||b?.bonusDate||b?.date||'').slice(0,10);
  if(/^\d{4}-\d{2}-\d{2}$/.test(raw))return raw;
  const n=ms(b);
  return n?todayKey(new Date(n)):todayKey();
}
function manualBonusFallbackId(b){return `${key(b?.user)}_${manualBonusDate(b)}_${Number(b?.amount||0)}_${ms(b)||''}`}
function manualBonusId(b){return String(b?.id||b?.docId||b?.clientId||manualBonusFallbackId(b))}
function manualBonusIsSeen(b,seen){return seen.has(manualBonusId(b))||seen.has(manualBonusFallbackId(b))}
function markManualBonusesSeen(rows){
  const seen=getManualSeen();
  (rows||[]).forEach(b=>{seen.add(manualBonusId(b));seen.add(manualBonusFallbackId(b));});
  saveManualSeen(seen);
}
function unreadManualBonusRows(){
  if(!state.user)return [];
  const seen=getManualSeen(), d=todayKey();
  return sortDesc((state.data.manual||[]).filter(b=>{
    if(!b||deleted(b)||manualBonusDate(b)!==d||Number(b.amount||0)<=0)return false;
    return !manualBonusIsSeen(b,seen);
  }));
}
function dismissManualBonusNotice(){

function manualBonusNoticeCard(){

}
function notifyNewManualBonuses(){

let successAudio=null;
function primeSuccessSound(){try{if(!successAudio){successAudio=new Audio(SUCCESS_SOUND_SRC);successAudio.preload='auto';successAudio.volume=0.9;successAudio.load();}}catch(e){}}
function playSuccessSound(){try{primeSuccessSound();if(!successAudio)return;successAudio.pause();successAudio.currentTime=0;const p=successAudio.play();if(p&&p.catch)p.catch(()=>{});}catch(e){}}
function onlyDigits(v){return String(v||'').replace(/[^0-9]/g,'')}
function formatRupiahInput(el){const n=onlyDigits(el.value);el.value=n?'Rp '+rp(Number(n)):''}
function modal(title,body,actions='',variant=''){
  closeModal(true); // bersihkan modal lama dulu supaya popup transaksi tidak dobel
  const r=$('modal'), cls=variant?` ${variant}`:'', wrap=variant==='tx-modal'?'modal-wrap show tx-backdrop':'modal-wrap show';
  if(!r)return;
  r.removeAttribute('style');
  r.innerHTML=`<div class="modal${cls}" role="dialog" aria-modal="true"><div class="modal-head"><div><div class="modal-title">${esc(title)}</div></div><button type="button" class="icon" onpointerdown="closeModal(true);event.preventDefault()" ontouchstart="closeModal(true);event.preventDefault()" onclick="closeModal(true)">×</button></div>${body}${actions?`<div class="modal-actions">${actions}</div>`:''}</div>`;
  r.className=wrap;
}
function closeModal(force=false){
  try{if(document.activeElement&&typeof document.activeElement.blur==='function')document.activeElement.blur()}catch(e){}
  const main=$('modal');
  if(main){
    main.className='modal-wrap';
    main.innerHTML='';
    main.style.display='none';
    main.style.pointerEvents='none';
    main.offsetHeight; // paksa browser flush supaya layer modal benar-benar hilang
    main.style.removeProperty('display');
    main.style.removeProperty('pointer-events');
  }
  document.querySelectorAll('.modal-wrap').forEach((el)=>{
    if(el!==main)el.remove();
  });
  document.querySelectorAll('.modal[role="dialog"]').forEach((el)=>{
    if(!main||!main.contains(el))el.remove();
  });
}
function getTheme(){return localStorage.getItem('rocky_staff_theme')||'light'}
function setTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('rocky_staff_theme',t)}
function toggleTheme(){setTheme(getTheme()==='dark'?'light':'dark');render()}
function pendingKey(){return PENDING_KEY+'_'+key(state.user?.username||'guest')}
function getPending(){try{return JSON.parse(localStorage.getItem(pendingKey())||'[]')}catch(e){return []}}
function setPending(list){localStorage.setItem(pendingKey(),JSON.stringify(list||[]))}
function pendingForUser(){const u=key(state.user?.username);return getPending().filter(x=>!u||key(x.user)===u)}
function addPending(item){const list=getPending().filter(x=>x.id!==item.id);list.push({...item,tries:Number(item.tries||0),lastTryMs:item.lastTryMs||0});setPending(list)}
function removePending(id){setPending(getPending().filter(x=>x.id!==id))}
function isPermissionError(e){return String(e?.code||e?.message||'').toLowerCase().includes('permission')}
function localTxFromPending(p){return {id:p.id,...(p.payload||{}),pending:true}}
function localAttFromPending(p){return {id:p.id,...(p.payload||{}),pending:true}}
function applyPendingToState(){
  const p=pendingForUser();
  p.forEach(x=>{
    if(x.type==='tx_add'&&!state.data.tx.some(t=>String(t.id)===String(x.id)))state.data.tx.unshift(localTxFromPending(x));

async function flushPending(){
  if(!state.user||state.syncing)return;
  let list=getPending();
  if(!list.length)return;
  state.syncing=true;
  state.syncError='';
  const remain=[];
  for(const item of list){
    if(key(item.user)!==key(state.user.username)){remain.push(item);continue}
    try{
      if(item.type==='tx_add'){
        const allowed=await verifyTransactionAllowedServer(item.payload?.dateKey||todayKey());
        if(!allowed.ok){
          item.tries=Number(item.tries||0)+1;
          item.lastTryMs=Date.now();
          remain.push(item);
          state.syncError=allowed.msg||'Pending transaksi belum bisa diverifikasi.';
          continue;
        }
        await setDoc(doc(db,'transactions',item.id),{...(item.payload||{}),createdAt:serverTimestamp(),syncedAt:serverTimestamp(),syncedAtMs:Date.now()},{merge:true});
      }
      else if(item.type==='att_add'){
        const payload=item.payload||{};
        const d=String(payload.dateKey||todayKey()).slice(0,10), docId=attendanceDocId(item.user||payload.user,d);
        const existing=await getDocFromServer(doc(db,'attendance',docId));
        if(!existing.exists())await setDoc(doc(db,'attendance',docId),{...payload,clientId:docId,dateKey:d,createdAt:serverTimestamp(),syncedAt:serverTimestamp(),syncedAtMs:Date.now()},{merge:true});
        item.id=docId;
      }
      else remain.push(item);
    }catch(e){
      console.warn('pending sync failed',e?.code||e);
      item.tries=Number(item.tries||0)+1;
      item.lastTryMs=Date.now();
      remain.push(item);
      if(isPermissionError(e)){state.syncError='Akses Firebase ditolak. Data belum bisa sync.';break}
      else state.syncError='Koneksi belum stabil, sync akan dicoba lagi.';
    }
  }
  setPending(remain);
  state.syncing=false;
  applyPendingToState();
  render();
}

    role:userRole,

    clientId:id,

  };
  const local={id,...payload,pending:true};
  closeModal();

  render();

    await setDoc(doc(db,'transactions',id),{...payload,createdAt:serverTimestamp(),syncedAt:serverTimestamp(),syncedAtMs:Date.now()},{merge:false});

async function boot(){

  try{raw.push(JSON.parse(localStorage.getItem(LEGACY_SESSION)||'null'))}catch(e){}
  for(const s of raw.filter(Boolean)){
    try{
      const username=key(s.username||s.user||s.id);
      const pin=String(s.pin||'');
      if(!username||!pin)continue;
      const snap=await getDocFromServer(doc(db,'users',username));
      if(!snap.exists())continue;
      const rawData=snap.data()||{};
      const data={id:snap.id,username:rawData.username||snap.id,...rawData};
      if(!isAdmin(data)&&data.active!==false&&!deleted(data)&&String(data.pin||'')===pin){
        if(!isDailyUser(data)&&Number(data.deviceResetAtMs||0)>Number(s.deviceResetAtMs||0)){
          const serverDeviceId=String(data.deviceId||'').trim();
          const thisDeviceId=getDeviceId();
          // Kalau reset lama sudah dipakai login ulang di device ini, jangan logout lagi.
          // Ini penting untuk sesi lama/legacy yang belum menyimpan deviceResetAtMs.
          if(serverDeviceId&&serverDeviceId===thisDeviceId){
            s.deviceResetAtMs=Number(data.deviceResetAtMs||0);
            s.deviceId=serverDeviceId;
            try{localStorage.setItem(SESSION,JSON.stringify({...s,deviceResetAtMs:s.deviceResetAtMs,deviceId:s.deviceId}))}catch(e){}
          }else{
            localStorage.removeItem(SESSION);
            localStorage.removeItem(LEGACY_SESSION);
            toast('Device akun ini sudah direset admin. Silakan login ulang.');
            break;
          }
        }
        const lock=await verifyDeviceLockForLogin(data,username);
        if(!lock.ok){
          localStorage.removeItem(SESSION);
          localStorage.removeItem(LEGACY_SESSION);
          toast(lock.msg);
          break;
        }
        state.user={username:key(data.username||username),name:data.name||username,pin:String(data.pin||''),role:data.role||'staff',transactionBonusRate:hasBonusValue(data.transactionBonusRate)?Number(data.transactionBonusRate):null,transactionBonusPercent:hasBonusValue(data.transactionBonusPercent)?Number(data.transactionBonusPercent):null,closingBonusPerMinute:isDailyUser(data)?0:(hasBonusValue(data.closingBonusPerMinute)?Number(data.closingBonusPerMinute):null),dailyBonusRate:Number(data.dailyBonusRate||0),dailyBonusPercent:Number(data.dailyBonusPercent||0),active:data.active!==false,deviceId:lock.deviceId,deviceResetAtMs:Number(data.deviceResetAtMs||0)};
        const saved={username:state.user.username,name:state.user.name,pin:state.user.pin,role:state.user.role,transactionBonusRate:state.user.transactionBonusRate,transactionBonusPercent:state.user.transactionBonusPercent,closingBonusPerMinute:isDailyUser(state.user)?0:state.user.closingBonusPerMinute,dailyBonusRate:state.user.dailyBonusRate,dailyBonusPercent:state.user.dailyBonusPercent,active:true,deviceId:state.user.deviceId,deviceResetAtMs:state.user.deviceResetAtMs};
        localStorage.setItem(SESSION,JSON.stringify(saved));
        localStorage.setItem(LEGACY_SESSION,JSON.stringify({username:state.user.username,pin:state.user.pin}));
        await loadStaffData();
        return;
      }
    }catch(e){console.warn(e)}
  }
  localStorage.removeItem(SESSION);
  localStorage.removeItem(LEGACY_SESSION);
  renderLogin();
}

function installSwipeBack(){
  if(window.__ROCKY_SWIPE_BACK_INSTALLED__)return;
  window.__ROCKY_SWIPE_BACK_INSTALLED__=true;
  const hint=$('swipeBackHint');
  const ptr={active:false,startX:0,startY:0,lastX:0,lastY:0,ready:false};
  const blocked=t=>t&&t.closest&&t.closest('input,textarea,select,button,a,.modal-wrap,.nav');
  const showHint=show=>{if(!hint)return;hint.classList.toggle('show',!!show)};
  const reset=()=>{ptr.active=false;ptr.ready=false;showHint(false);if(page){page.style.transition='';page.style.transform='';page.style.willChange=''}};
  document.addEventListener('touchstart',e=>{
    if(!state.user||state.page==='home'||e.touches.length!==1)return;
    if(document.querySelector('.modal-wrap.show'))return;
    if(blocked(e.target))return;
    const t=e.touches[0];
    ptr.active=true;ptr.ready=false;ptr.startX=t.clientX;ptr.startY=t.clientY;ptr.lastX=t.clientX;ptr.lastY=t.clientY;
    if(page)page.style.willChange='transform';
  },{passive:true});
  document.addEventListener('touchmove',e=>{
    if(!ptr.active||e.touches.length!==1)return;
    const t=e.touches[0],dx=t.clientX-ptr.startX,dy=t.clientY-ptr.startY;
    ptr.lastX=t.clientX;ptr.lastY=t.clientY;
    if(Math.abs(dy)>42&&Math.abs(dy)>Math.abs(dx)){reset();return}
    if(dx<-14&&Math.abs(dx)>Math.abs(dy)*1.25){
      e.preventDefault();
      const move=Math.max(-64,dx*.28);
      ptr.ready=dx<-74;
      showHint(ptr.ready);
      if(page){page.style.transition='';page.style.transform=`translateX(${move}px)`}
    }
  },{passive:false});
  document.addEventListener('touchend',()=>{
    if(!ptr.active)return;
    const dx=ptr.lastX-ptr.startX,dy=ptr.lastY-ptr.startY,ok=ptr.ready&&dx<-74&&Math.abs(dx)>Math.abs(dy)*1.35;
    reset();
    if(ok)appBack({silentHome:true,source:'swipe'});
  },{passive:true});
  document.addEventListener('touchcancel',reset,{passive:true});
}

  };
  document.addEventListener('touchstart',e=>{
    if(ptr.reloading||state.busy||e.touches.length!==1)return;
    if(scrollTop()>0)return;
    if(document.querySelector('.modal-wrap.show'))return;
    if(isBlockedTarget(e.target))return;
    ptr.active=true;ptr.ready=false;ptr.startY=e.touches[0].clientY;ptr.dist=0;
    if(page){page.style.willChange='transform'}
  },{passive:true});
  document.addEventListener('touchmove',e=>{
    if(!ptr.active||ptr.reloading||e.touches.length!==1)return;
    const dy=e.touches[0].clientY-ptr.startY;
    if(dy<=0){resetPull();return}
    if(scrollTop()>0){resetPull();return}
    if(dy>8)e.preventDefault();
    ptr.dist=Math.min(78,dy*.55);
    ptr.ready=dy>96;
    indicator.textContent=ptr.ready?'Lepas untuk reload':'Tarik untuk reload';
    indicator.style.opacity=String(Math.min(1,dy/75));
    indicator.style.transform=`translate(-50%,${Math.min(12,ptr.dist-42)}px)`;
    if(page){
      page.style.transition='';
      page.style.transform=`translateY(${ptr.dist}px)`;
    }
  },{passive:false});
  const endPull=()=>{
    if(!ptr.active)return;
    const shouldReload=ptr.ready;
    resetPull();
    if(shouldReload){
      ptr.reloading=true;
      indicator.textContent='Memuat ulang...';
      indicator.style.opacity='1';
      indicator.style.transform='translate(-50%,12px)';
      setTimeout(()=>hardRefreshApp(),180);
    }
  };
  document.addEventListener('touchend',endPull,{passive:true});
  document.addEventListener('touchcancel',resetPull,{passive:true});
}


// FIX: penjaga pergantian tanggal WIB.
// Absen dan closing dihitung per dateKey, jadi UI wajib dirender ulang saat hari berganti.
let APP_DATE_KEY=todayKey();
let APP_DATE_CHECKING=false;
async function checkDateChange(){
  if(APP_DATE_CHECKING)return false;
  const nowKey=todayKey();
  if(nowKey===APP_DATE_KEY)return false;
  APP_DATE_CHECKING=true;
  APP_DATE_KEY=nowKey;
  try{
    closeModal();
    state.lastSyncMs=0;
    clearStaffRealtime();
    if(state.user){
      toast('Tanggal berganti. Absen & closing diperbarui.');
      await loadStaffData({silent:true});
    }else{
      render();
    }
  }catch(e){
    console.warn('date change refresh failed',e);
    render();
  }finally{
    APP_DATE_CHECKING=false;
  }
  return true;
}
function setupAutoSync(){
  // Tidak ada lagi refresh besar tiap 60 detik.
  // Realtime kecil yang menjaga transaksi/absen/closing hari ini tetap update.
  setInterval(async()=>{await checkDateChange();},60000);
  window.addEventListener('online',()=>{
    if(state.user){
      toast('Online lagi, sync pending dicek');
      flushPending();
      startStaffRealtime();
    }
  });
  window.addEventListener('focus',async()=>{
    const changed=await checkDateChange();
    if(!changed&&state.user){
      startStaffRealtime();
      render();
    }
  });
  document.addEventListener('visibilitychange',async()=>{
    if(!document.hidden){
      const changed=await checkDateChange();
      if(!changed&&state.user){
        startStaffRealtime();
        render();
      }
    }
  });
}
